[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "wex"
version = "6.0.119"
description = "A friendly CLI"
authors = [
    { name = "weeger", email = "contact@wexample.com" },
]
requires-python = ">=3.10"
classifiers = ["Programming Language :: Python :: 3", "License :: OSI Approved :: MIT License", "Operating System :: OS Independent"]
dependencies = [
    "tomli",
    "wexample-wex-addon-ai>=9.0.3",
    "wexample-wex-addon-app>=25.1.0",
    "wexample-wex-addon-dev-css>=6.0.62",
    "wexample-wex-addon-dev-javascript>=7.12.3",
    "wexample-wex-addon-dev-php>=8.8.3",
    "wexample-wex-addon-dev-python>=10.1.0",
    "wexample-wex-addon-filestate>=6.2.14",
    "wexample-wex-addon-master>=8.1.4",
    "wexample-wex-addon-package>=7.3.0",
    "wexample-wex-addon-services-collab>=11.6.3",
    "wexample-wex-addon-services-db>=11.7.3",
    "wexample-wex-addon-services-monitoring>=7.8.3",
    "wexample-wex-addon-services-platform>=12.4.2",
    "wexample-wex-core>=26.1.2",
]

[project.readme]
file = "README.md"
content-type = "text/markdown"

[project.license]
text = "MIT"

[project.urls]
homepage = "https://github.com/wexample/wex"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]

[tool.setuptools.packages.find]
include = ["*"]
exclude = ["wex.testing*"]

[tool.pdm]
distribution = true

[tool.pdm.build]
package-dir = "src"

[[tool.pdm.build.packages]]
include = "wex"
from = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--color=yes"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]

[tool.coverage.run]
source = ["wex"]
omit = ["*/tests/*", "*/.venv/*", "*/venv/*"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "def __repr__", "raise AssertionError", "raise NotImplementedError", "if __name__ == .__main__.:", "if TYPE_CHECKING:", "@abstractmethod"]
