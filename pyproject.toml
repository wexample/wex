[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "wex"
version = "6.0.103"
description = "A friendly CLI"
authors = [
    { name = "weeger", email = "contact@wexample.com" },
]
requires-python = ">=3.10"
classifiers = ["Programming Language :: Python :: 3", "License :: OSI Approved :: MIT License", "Operating System :: OS Independent"]
dependencies = [
    "tomli",
    "wexample-wex-addon-ai>=6.0.36",
    "wexample-wex-addon-app>=20.2.0",
    "wexample-wex-addon-dev-css>=6.0.47",
    "wexample-wex-addon-dev-javascript>=7.10.0",
    "wexample-wex-addon-dev-php>=8.4.5",
    "wexample-wex-addon-dev-python>=8.7.5",
    "wexample-wex-addon-filestate>=6.2.5",
    "wexample-wex-addon-master>=6.9.0",
    "wexample-wex-addon-package>=6.3.1",
    "wexample-wex-addon-services-collab>=11.4.2",
    "wexample-wex-addon-services-db>=11.4.0",
    "wexample-wex-addon-services-monitoring>=7.6.0",
    "wexample-wex-addon-services-platform>=11.8.2",
    "wexample-wex-core>=24.1.4",
]

[project.readme]
file = "README.md"
content-type = "text/markdown"

[project.license]
text = "MIT"

[project.urls]
homepage = "https://github.com/wexample/wex"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]

[tool.setuptools.packages.find]
include = ["*"]
exclude = ["wex.testing*"]

[tool.pdm]
distribution = true

[tool.pdm.build]
package-dir = "src"

[[tool.pdm.build.packages]]
include = "wex"
from = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
source = ["wex"]
omit = ["*/tests/*", "*/.venv/*", "*/venv/*"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "def __repr__", "raise AssertionError", "raise NotImplementedError", "if __name__ == .__main__.:", "if TYPE_CHECKING:", "@abstractmethod"]
