.checkup_install:
  extends:
    - .on_master
  needs:
    - deploy
    - wait_for_pypi
  script:
    - set -e
    - apt-get update -qq
    - apt-get install -y gnupg2 wget
    - wget -O - https://apt.wexample.com/gpg | gpg --dearmor -o /etc/apt/trusted.gpg.d/wexample.gpg
    - echo "deb http://apt.wexample.com/ stable main" | tee /etc/apt/sources.list.d/wexample.list
    - apt-get update -qq
    - apt-get install -y wex
    - wex hi
    - BUILD_VERSION=$(cat version.txt)
    - INSTALLED_VERSION=$(wex version)
    - echo "Expected ${BUILD_VERSION}, got ${INSTALLED_VERSION}"
    - test "${BUILD_VERSION}" = "${INSTALLED_VERSION}"
    - apt-get remove -y wex
.on_master:
  only:
    - main
build_apt:
  extends:
    - .on_master
  image: gitlab-docker.wexample.com/wexample/wex/wex-build:build
  script:
    - BUILD_VERSION=$(cat version.txt)
    - mkdir -p /var/tmp/build
    - cp -r .git /var/tmp/build
    - cd /var/tmp/build
    - git fetch && git checkout build
    - ln -s ${CI_PROJECT_DIR} source
    - sudo python3 /var/tmp/build/script/build.py -n wex -gid ${CI_PROJECT_ID} -gtk ${WEX_BUILD_TOKEN} -v ${BUILD_VERSION}
  stage: build_apt
checkup_install_debian:
  extends: .checkup_install
  image: debian:bookworm
  stage: checkup_install
checkup_install_ubuntu:
  extends: .checkup_install
  image: ubuntu:24.04
  stage: checkup_install
deploy:
  extends:
    - .on_master
  image: curlimages/curl
  needs:
    - build_apt
  script:
    - BUILD_VERSION=$(cat version.txt)
    - curl --fail "http://151.80.23.108:7654/webhook/app/prod/wex-apt-repo/apt/publish?_token=${WEX_WEBHOOK_TOKEN}&project=${CI_PROJECT_ID}&version=${BUILD_VERSION}&_async=0"
  stage: deploy
wait_for_pypi:
  extends:
    - .on_master
  image: python:3.11-slim
  needs:
    - deploy
  script:
    - python ci/wait_for_pypi_versions.py requirements.txt
  stage: wait_for_pypi
stages:
  - build_apt
  - deploy
  - wait_for_pypi
  - checkup_install
  - build_docker
build_docker:
  extends:
    - .on_master
  stage: build_docker
  image: docker:27
  needs:
    - checkup_install_debian
    - checkup_install_ubuntu
  script:
    - BUILD_VERSION=$(cat version.txt)
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker build --tag $CI_REGISTRY_IMAGE:$BUILD_VERSION --tag $CI_REGISTRY_IMAGE:latest -f .wex/docker/images/Dockerfile.runtime .
    - docker push $CI_REGISTRY_IMAGE:$BUILD_VERSION
    - docker push $CI_REGISTRY_IMAGE:latest
variables:
  MAIN_BRANCH_NAME: main
