description: "Publish source suite before publishing wex (when PROGRAM_PUBLICATION_SOURCE_LIBRARY_PATH is set)"
decorators:
  - name: attach
    args:
      position: before
      command: app::app/publish
scripts:
  - name: Execute main publish method
    runner: bash
    script: |
      if [ -z "${PROGRAM_PUBLICATION_SOURCE_LIBRARY_PATH:-}" ]; then
        exit 0
      fi
      echo "Publishing source suite at ${PROGRAM_PUBLICATION_SOURCE_LIBRARY_PATH}..."
      cd "${PROGRAM_PUBLICATION_SOURCE_LIBRARY_PATH}"
      .wex/bin/app-manager app::suite/publish --yes
  - name: Sync library versions into wex requirements
    runner: bash
    script: |
      if [ -z "${PROGRAM_PUBLICATION_SOURCE_LIBRARY_PATH:-}" ]; then
        exit 0
      fi
      echo "Syncing library versions..."
      wex app::libraries/sync
